name: Android release APK

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "Backend base URL (LUNA_API_URL, no trailing slash)"
        required: false
        default: "https://luna-app-pqia7.ondigitalocean.app"

env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        # The repo has one known, intentional warning (LockCachingAudioSource
        # is experimental) — don't let it fail the build.
        run: flutter analyze --no-fatal-warnings

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=LUNA_API_URL=${{ inputs.api_url }}

      - uses: actions/upload-artifact@v4
        with:
          name: luna-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
